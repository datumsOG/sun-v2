<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0b0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Sun alignment, light planning, and reflection vectors on an interactive map.">
<title>Sun · light planner</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<link rel="preconnect" href="https://tiles.openfreemap.org">
<link rel="preconnect" href="https://photon.komoot.io">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="map" aria-label="Map"></div>

<header id="topbar" class="glass">
  <div id="search-wrap">
    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    <input id="search" type="search" placeholder="Search a place" autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="locate-btn" class="iconbtn" title="Use my location" aria-label="Use my location">
      <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3" fill="currentColor"/><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M12 1v3M12 20v3M1 12h3M20 12h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
  <ul id="search-results" hidden></ul>
</header>

<aside id="info" class="glass" aria-live="polite">
  <div class="info-row">
    <div class="info-col">
      <div class="info-label">Sunrise</div>
      <div class="info-value" id="info-sunrise">—</div>
      <div class="info-sub" id="info-sunrise-az">—</div>
    </div>
    <div class="info-col">
      <div class="info-label">Sunset</div>
      <div class="info-value" id="info-sunset">—</div>
      <div class="info-sub" id="info-sunset-az">—</div>
    </div>
    <div class="info-col">
      <div class="info-label">Now</div>
      <div class="info-value" id="info-now">—</div>
      <div class="info-sub" id="info-now-az">—</div>
    </div>
  </div>
  <div id="alignment-card" class="alignment" hidden>
    <div class="alignment-label">Next alignment</div>
    <div class="alignment-detail">
      <span id="alignment-when">—</span>
      <button id="alignment-jump" class="ghostbtn">Jump</button>
    </div>
    <button id="alignment-clear" class="closebtn" aria-label="Clear target">×</button>
  </div>
</aside>

<aside id="modes" class="glass">
  <button class="mode-btn active" data-mode="sun" aria-pressed="true">
    <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4" fill="currentColor"/><g stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.5 4.5l2 2M17.5 17.5l2 2M19.5 4.5l-2 2M6.5 17.5l-2 2"/></g></svg>
    <span>Sun</span>
  </button>
  <button class="mode-btn" data-mode="moon" aria-pressed="false">
    <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="currentColor"/></svg>
    <span>Moon</span>
  </button>
  <button class="mode-btn" data-mode="reflection" aria-pressed="false">
    <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12h16M8 7l-4 5 4 5M16 7l4 5-4 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>Reflect</span>
  </button>
  <button class="mode-btn" data-mode="arrow" aria-pressed="false">
    <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l6 18-6-4.5L6 21z" fill="currentColor"/></svg>
    <span>Arrow</span>
  </button>
  <button id="shadow-toggle" class="iconbtn" title="Shadow overlay" aria-label="Shadow overlay" aria-pressed="false">
    <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><ellipse cx="12" cy="19" rx="8" ry="2.5" fill="currentColor" opacity="0.5"/><path d="M12 3l1 8h-2z" fill="currentColor"/><line x1="12" y1="11" x2="4" y2="19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
  </button>
  <button id="compass-btn" class="iconbtn" title="Compass mode" aria-label="Compass mode">
    <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="m12 5 2 7-2 7-2-7z" fill="currentColor"/></svg>
  </button>
  <button id="share-btn" class="iconbtn" title="Share link" aria-label="Share link">
    <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7M16 6l-4-4-4 4M12 2v13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <button id="save-reminder-btn" class="iconbtn" title="Save reminder for this time" aria-label="Save reminder">
    <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M12 7v5l3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</aside>
<div id="moon-info" class="glass moon-badge" hidden></div>

<section id="bottom" class="glass">
  <svg id="chart" viewBox="0 0 600 110" preserveAspectRatio="none" aria-label="Solar elevation curve"></svg>
  <div id="scrubber-row">
    <div id="sun-alt" aria-label="Sun altitude">—</div>
    <div id="scrubber-wrap">
      <input id="scrubber" type="range" min="0" max="1439" step="1" value="720" aria-label="Time of day">
      <div id="scrubber-ticks"></div>
    </div>
    <div id="time-readout">
      <span id="time-hh">12:00</span>
      <button id="date-btn" class="ghostbtn" aria-label="Pick date">
        <span id="date-label">Today</span>
      </button>
      <input id="date-input" type="date" hidden>
    </div>
  </div>
</section>

<div id="toast" class="glass" hidden></div>
<div id="hint" class="glass" hidden>Long-press the map to set an alignment target</div>

<!-- Arrow / AR view (shown when mode = 'arrow') -->
<div id="arrow-view" hidden>
  <canvas id="arrow-canvas"></canvas>
  <video id="arrow-video" autoplay playsinline muted hidden></video>

  <!-- 2D guide arrow (shown in AR mode when sun is off-screen) -->
  <div id="guide-arrow" aria-hidden="true">
    <svg viewBox="0 0 40 56" width="40" height="56" fill="none">
      <path d="M20 2 L36 46 L20 36 L4 46 Z" fill="#ffb845" opacity="0.95"/>
      <path d="M20 2 L36 46 L20 36 L4 46 Z" stroke="#fff" stroke-width="1" stroke-linejoin="round" opacity="0.4"/>
    </svg>
  </div>

  <!-- Sun disk overlay (shown in AR mode when sun is on-screen) -->
  <div id="sun-disk" hidden aria-hidden="true"></div>

  <!-- HUD: sensor button / stats / camera toggle / capture / calibrate -->
  <div id="arrow-hud" class="glass">
    <button id="arrow-sensor-btn">Enable sensors</button>
    <div id="arrow-hud-stats" hidden>
      <span id="arrow-az-val" class="arrow-stat">—</span>
      <span id="arrow-el-val" class="arrow-stat">—</span>
    </div>
    <button id="arrow-cam-btn" hidden>📷 Camera</button>
    <button id="arrow-calibrate-btn" class="arrow-action-btn" hidden title="Tap to align arrow with actual sun position">Align</button>
    <button id="arrow-capture-btn" class="arrow-action-btn" hidden title="Capture frame as PNG">Capture</button>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.169.0/build/three.module.js" } }</script>
<script type="module" src="js/app.js"></script>
<script>if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); }); }</script>
</body>
</html>
