<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0b0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Sun and moon alignment, light planning, reflection vectors and shadows on an interactive map.">
<title>Sun · light planner</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<link rel="preconnect" href="https://tiles.openfreemap.org">
<link rel="preconnect" href="https://photon.komoot.io">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<link rel="stylesheet" href="css/style.css?v=38">
<!-- Sentry error monitoring (optional). To enable:
     1. Sign up at sentry.io (free tier) and create a Browser JS project.
     2. Uncomment the script below and replace the src version if needed.
     3. Set window.SENTRY_DSN below to your project's DSN.
<script src="https://browser.sentry-cdn.com/8.54.0/bundle.min.js" crossorigin="anonymous"></script>
<script>window.SENTRY_DSN = 'https://YOUR_KEY@oXXX.ingest.sentry.io/YOUR_PROJECT_ID';</script>
-->
</head>
<body>
<div id="map" aria-label="Map"></div>

<!-- Search is functionally retained but visually hidden — drives geocoding logic only. -->
<div id="search-wrap" hidden>
  <input id="search" type="search" autocomplete="off">
  <ul id="search-results" hidden></ul>
</div>

<!-- Bottom dock: slider, then time readout, then control row. Nothing above. -->
<section id="dock" class="glass">
  <div id="scrubber-wrap">
    <input id="scrubber" type="range" min="0" max="1439" step="1" value="720" aria-label="Time of day">
    <div id="scrubber-ticks"></div>
    <div id="moon-phase-marker" hidden aria-hidden="true"></div>
  </div>

  <div id="time-row">
    <div id="time-hh">12:00</div>
    <button id="date-btn" class="ghostbtn" type="button" aria-label="Pick date">
      <span id="date-label">Today</span>
      <input id="date-input" type="date" tabindex="-1" aria-hidden="true">
    </button>
    <div id="sun-alt" aria-label="Body altitude">—</div>
    <div id="rise-set">
      <span id="rise-label">↑ —</span>
      <span id="set-label">↓ —</span>
    </div>
  </div>

  <div id="control-row" class="ctl-row">
    <button id="body-toggle" class="ctlbtn" aria-label="Toggle sun/moon">
      <svg id="body-icon-sun" class="ico hide" width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" fill="currentColor"/><g stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.5 4.5l2 2M17.5 17.5l2 2M19.5 4.5l-2 2M6.5 17.5l-2 2"/></g></svg>
      <svg id="body-icon-moon" class="ico" width="22" height="22" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="currentColor"/></svg>
    </button>

    <button id="view-toggle" class="ctlbtn" aria-label="Toggle map/camera">
      <svg id="view-icon-camera" class="ico" width="22" height="22" viewBox="0 0 24 24"><path d="M4 8h3l2-3h6l2 3h3a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="13" r="3.5" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
      <svg id="view-icon-map" class="ico hide" width="22" height="22" viewBox="0 0 24 24"><path d="M3 6l6-2 6 2 6-2v14l-6 2-6-2-6 2zM9 4v16M15 6v16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
    </button>

    <button id="locate-btn" class="ctlbtn" aria-label="Center on my location">
      <svg width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="currentColor"/><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M12 1v3M12 20v3M1 12h3M20 12h3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>

    <button id="compass-toggle" class="ctlbtn toggle" aria-pressed="false" aria-label="Compass mode">
      <svg width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="m12 5 2 7-2 7-2-7z" fill="currentColor"/></svg>
    </button>


<button id="reflection-toggle" class="ctlbtn toggle" aria-pressed="false" aria-label="Reflection mode">
      <svg width="22" height="22" viewBox="0 0 24 24"><path d="M4 12h16M8 7l-4 5 4 5M16 7l4 5-4 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <button id="reminder-btn" class="ctlbtn" aria-label="Save reminder">
      <svg width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M12 7v5l3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <button id="share-btn" class="ctlbtn" aria-label="Share link">
      <svg width="22" height="22" viewBox="0 0 24 24"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7M16 6l-4-4-4 4M12 2v13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <button id="invert-btn" class="ctlbtn" aria-label="Invert map">
      <svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor"/><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
    </button>
  </div>

  <div id="shadow-elev-panel" hidden>
    <div class="elev-row">
      <label for="shadow-elev">Caster</label>
      <input id="shadow-elev" type="range" min="0" max="1000" step="1" value="0">
      <span id="shadow-elev-val">0 m</span>
    </div>
    <div class="elev-row">
      <label for="floor-elev">Floor</label>
      <input id="floor-elev" type="range" min="0" max="1000" step="1" value="0">
      <span id="floor-elev-val">0 m</span>
    </div>
  </div>

</section>

<!-- Right-edge vertical sliders: arc radius (lower 2/3) and map tilt (upper 1/3) -->
<input id="tilt-slider" class="vslider tilt" type="range" min="0" max="75" step="1" value="55" aria-label="Map tilt">
<input id="radius-slider" class="vslider radius" type="range" min="0" max="1000" step="1" value="445" aria-label="Arc radius">

<div id="toast" class="glass" hidden></div>

<!-- Camera view (active when view = 'camera') -->
<div id="camera-view" hidden>
  <video id="cam-video" autoplay playsinline muted></video>

  <!-- 2D guide arrow points off-screen toward sun/moon -->
  <div id="guide-arrow" aria-hidden="true">
    <svg viewBox="0 0 40 56" width="40" height="56" fill="none">
      <path d="M20 2 L36 46 L20 36 L4 46 Z" fill="#ffb845" opacity="0.95"/>
    </svg>
  </div>

  <!-- Sun/moon disk overlay positioned via JS -->
  <div id="body-disk" hidden aria-hidden="true">
    <div id="body-disk-shadow"></div>
  </div>

  <div id="cam-hud" class="glass">
    <button id="cam-sensor-btn">Enable sensors</button>
  </div>

  <div id="cam-actions">
    <button id="cam-ar-btn" class="cam-action">AR off</button>
    <button id="cam-calibrate" class="cam-action" hidden>Align</button>
    <button id="cam-capture" class="cam-action" hidden>Capture</button>
  </div>

  <!-- AR overlay container — populated by camera-view at runtime when AR is on -->
  <div id="ar-overlay" hidden></div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.169.0/build/three.module.js" } }</script>
<script type="module" src="js/app.js?v=38"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.update())).catch(() => {});
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
